# Демо на этом ПК: docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d --build
# Открыть http://localhost:8080  или туннель cloudflared на :8080

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docs/Caddyfile.demo:/etc/caddy/Caddyfile:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  backend:
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      DEBUG: "false"
      DEMO_MODE: "true"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      NODE_ENV: production

  celery_worker:
    restart: unless-stopped

  celery_beat:
    restart: unless-stopped
