name: Refresh official data snapshots

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh operational open data snapshot
        run: python scripts/generate_operational_snapshot.py

      - name: Refresh hot BDMO snapshot from cached sections
        run: python scripts/generate_bdmo_snapshot.py --combine-only --min-year 2024 --max-year 2025
        continue-on-error: true

      - name: Setup Node and verify
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Commit refreshed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/operationalSnapshot.ts src/data/opendataCatalog.json src/data/bdmoSnapshot.ts
          if git diff --staged --quiet; then
            echo "No snapshot changes"
            exit 0
          fi
          git commit -m "chore: refresh official data snapshots"
          git push
